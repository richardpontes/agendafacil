{% extends 'core/base.html' %}

{% block title %}Novo Bloqueio — AgendaFácil{% endblock %}

{% block content %}
<div class="d-flex" style="min-height: 100vh;">
    <!-- Sidebar -->
    <div class="d-flex flex-column p-3" style="width: 250px; flex-shrink: 0; background-color: #6c63ff; min-height: 100vh;">
        <h5 class="text-white fw-bold mb-4 mt-2">AgendaFácil</h5>
        <nav class="nav flex-column gap-2">
            <a href="{% url 'dashboard_prestador' %}" class="nav-link text-white">
                <i class="bi bi-house me-2"></i>Início
            </a>
            <a href="{% url 'agenda_prestador' %}" class="nav-link text-white">
                <i class="bi bi-calendar2-week me-2"></i>Minha Agenda
            </a>
            <a href="{% url 'listar_servicos' %}" class="nav-link text-white">
                <i class="bi bi-scissors me-2"></i>Meus Serviços
            </a>
            <a href="{% url 'listar_bloqueios' %}" class="nav-link text-white fw-bold">
                <i class="bi bi-slash-circle me-2"></i>Bloqueios
            </a>
            <a href="#" class="nav-link text-white">
                <i class="bi bi-person me-2"></i>Meu Perfil
            </a>
        </nav>
        <div class="mt-auto">
            <a href="{% url 'logout' %}" class="nav-link text-white">
                <i class="bi bi-box-arrow-right me-2"></i>Sair
            </a>
        </div>
    </div>

    <!-- Conteúdo principal -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'listar_bloqueios' %}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Novo Bloqueio</h4>
        </div>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Profissional</label>
                        <select name="profissional" class="form-select" required>
                            <option value="">Selecione...</option>
                            {% for prof in profissionais %}
                            <option value="{{ prof }}" {% if prof == profissional_selecionado %}selected{% endif %}>{{ prof }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Data e hora de início</label>
                        <input type="datetime-local" name="data_hora_inicio" class="form-control" value="{{ data_hora_inicio }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Data e hora de fim</label>
                        <input type="datetime-local" name="data_hora_fim" class="form-control" value="{{ data_hora_fim }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Motivo (opcional)</label>
                        <input type="text" name="motivo" class="form-control" placeholder="Ex: Consulta médica, folga..." value="{{ motivo }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primario px-4">Salvar Bloqueio</button>
                        <a href="{% url 'listar_bloqueios' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
