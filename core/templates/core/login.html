{% extends 'core/base.html' %}

{% block title %}Login — AgendaFácil{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #6c63ff, #a29bfe);">
    <div class="card shadow-lg" style="width: 100%; max-width: 420px; border-radius: 16px;">
        <div class="card-body p-5">
            <h2 class="text-center fw-bold text-primario mb-1">AgendaFácil</h2>
            <p class="text-center text-muted mb-4">Faça login para continuar</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="lembrar">
                    <label class="form-check-label" for="lembrar">Lembrar de mim</label>
                </div>
                <button type="submit" class="btn btn-primario w-100 py-2 fw-bold">Entrar</button>
            </form>

            <div class="text-center mt-3">
                <a href="#" class="text-primario text-decoration-none small">Esqueceu sua senha?</a>
            </div>
            <hr>
            <p class="text-center text-muted small mb-2">Ainda não tem uma conta?</p>
            <a href="{% url 'cadastro' %}" class="btn btn-outline-secondary w-100">Criar Conta</a>

            <div class="text-center mt-3">
                <a href="{% url 'index' %}" class="text-muted text-decoration-none small">← Voltar para a página inicial</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
