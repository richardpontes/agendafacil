{% extends 'core/base.html' %}

{% block title %}Editar Serviço — AgendaFácil{% endblock %}

{% block content %}
<div class="d-flex" style="min-height: 100vh;">
    <!-- Sidebar -->
    <div class="d-flex flex-column p-3" style="width: 250px; flex-shrink: 0; background-color: #6c63ff; min-height: 100vh;">
        <h5 class="text-white fw-bold mb-4 mt-2">AgendaFácil</h5>
        <nav class="nav flex-column gap-2">
            <a href="{% url 'dashboard_prestador' %}" class="nav-link text-white">
                <i class="bi bi-house me-2"></i>Início
            </a>
            <a href="{% url 'agenda_prestador' %}" class="nav-link text-white">
                <i class="bi bi-calendar2-week me-2"></i>Minha Agenda
            </a>
            <a href="{% url 'listar_servicos' %}" class="nav-link text-white fw-bold">
                <i class="bi bi-scissors me-2"></i>Meus Serviços
            </a>
            <a href="#" class="nav-link text-white">
                <i class="bi bi-slash-circle me-2"></i>Bloqueios
            </a>
            <a href="#" class="nav-link text-white">
                <i class="bi bi-person me-2"></i>Meu Perfil
            </a>
        </nav>
        <div class="mt-auto">
            <a href="{% url 'logout' %}" class="nav-link text-white">
                <i class="bi bi-box-arrow-right me-2"></i>Sair
            </a>
        </div>
    </div>

    <!-- Conteúdo principal -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center mb-4">
            <a href="{% url 'listar_servicos' %}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Editar Serviço</h4>
        </div>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome do Serviço</label>
                        <input type="text" name="nome" class="form-control" value="{{ servico.nome }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Descrição</label>
                        <textarea name="descricao" class="form-control" rows="3">{{ servico.descricao }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Duração (minutos)</label>
                            <input type="number" name="duracao" class="form-control" value="{{ servico.duracao }}" min="15" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-semibold">Preço (R$)</label>
                            <input type="text" name="preco" class="form-control" value="{{ servico.preco }}" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" name="ativo" class="form-check-input" id="ativo" {% if servico.ativo %}checked{% endif %}>
                        <label class="form-check-label" for="ativo">Serviço ativo</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primario px-4">Salvar Alterações</button>
                        <a href="{% url 'listar_servicos' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
